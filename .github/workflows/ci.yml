name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # Runs before npm ci/build so the scan does not traverse node_modules or .next.
      - name: Secret scan (gitleaks CLI, pinned release)
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -sSfL -o "$RUNNER_TEMP/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" dir . --config .gitleaks.toml --no-banner --redact --exit-code 1
      # Catches workflow syntax and expression-context errors (for example an
      # env context that is invalid at job level) before they surface as a
      # failed run on a pushed release branch.
      - name: Workflow lint (actionlint CLI, pinned release)
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          curl -sSfL -o "$RUNNER_TEMP/actionlint.tar.gz" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  $RUNNER_TEMP/actionlint.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Pin npm
        run: npm install --global npm@10.9.3
      - name: Check development runtime
        run: npm run check:node
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - run: npm run lint
      - name: Typecheck
        run: npm exec tsc -- --noEmit
      - run: npm run test:unit
      - name: Public-mirror guardrails
        if: github.event.repository.private
        run: npm run test:release-guardrails
      - name: Cache Next.js build output
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - run: npm run build

  sonar-public-snapshot:
    name: SonarCloud public snapshot
    if: github.repository == 'CorgiCorner/tickward-private'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -sSfL -o "$RUNNER_TEMP/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Validate and analyze isolated public snapshot
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # PR review requires a completed quality gate. A main push may still
          # emit an explicitly degraded artifact after transient Sonar outages.
          TICKWARD_SONAR_POLICY: ${{ github.event_name == 'pull_request' && 'gate' || 'config' }}
        run: |
          if [[ -z "$SONAR_TOKEN" ]]; then
            echo "::error::SONAR_TOKEN is required for private snapshot analysis"
            exit 1
          fi
          artifact_args=()
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            artifact_args=(--emit-artifact "$RUNNER_TEMP/public-snapshot-artifact")
          fi
          scripts/publish-public.sh --validate-only "${artifact_args[@]}"
      - name: Upload verified public snapshot
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-snapshot-${{ github.sha }}
          path: ${{ runner.temp }}/public-snapshot-artifact/*
          retention-days: 30
          if-no-files-found: error
          overwrite: true
