name: Container Image

on:
  # Atomic release pushes of main + vX.Y.Z do not emit a separate tag run.
  # Releases arrive through repository_dispatch with explicit semver payloads.
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - container-image
  workflow_dispatch:
    inputs:
      push_ghcr:
        description: "Publish to GHCR with GHCR_TOKEN or github.token"
        type: boolean
        default: true
      push_dockerhub:
        description: "Publish the Docker Hub mirror when credentials are configured"
        type: boolean
        default: true

env:
  GHCR_IMAGE: ghcr.io/corgicorner/tickward
  DOCKERHUB_IMAGE: docker.io/corgicorner/tickward

jobs:
  prepare:
    name: Prepare image metadata
    if: github.repository == 'CorgiCorner/tickward' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    outputs:
      dockerhub_enabled: ${{ steps.dockerhub.outputs.enabled }}
      ghcr_enabled: ${{ steps.ghcr.outputs.enabled }}
      labels: ${{ steps.ghcr-meta.outputs.labels }}

    steps:
      - name: Check GHCR credentials
        id: ghcr
        env:
          PUSH_GHCR_INPUT: ${{ inputs.push_ghcr }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUSH_GHCR_INPUT}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping GHCR because it was explicitly disabled for this manual run."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::GHCR enabled with GHCR_TOKEN or the workflow's github.token fallback."
          fi

      - name: Check Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PUSH_DOCKERHUB_INPUT: ${{ inputs.push_dockerhub }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUSH_DOCKERHUB_INPUT}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Docker Hub because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."
          fi

      - name: Check registry selection
        env:
          PUBLISH_GHCR: ${{ steps.ghcr.outputs.enabled }}
          PUBLISH_DOCKERHUB: ${{ steps.dockerhub.outputs.enabled }}
          PUSH_GHCR_INPUT: ${{ inputs.push_ghcr }}
          PUSH_DOCKERHUB_INPUT: ${{ inputs.push_dockerhub }}
        run: |
          if [ "${PUBLISH_GHCR}" != "true" ] && [ "${PUBLISH_DOCKERHUB}" != "true" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] \
              && [ "${PUSH_GHCR_INPUT}" = "false" ] \
              && [ "${PUSH_DOCKERHUB_INPUT}" = "false" ]; then
              echo "No container registry credentials are enabled because both registries were explicitly disabled." >&2
              exit 1
            fi
            echo "::warning::No registry is enabled for this manual run; GHCR was opted out and Docker Hub credentials are unavailable."
          fi

      - name: Extract GHCR metadata
        id: ghcr-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.client_payload.version }},enable=${{ github.event_name == 'repository_dispatch' }}
            type=raw,value=${{ github.event.client_payload.minor }},enable=${{ github.event_name == 'repository_dispatch' }}
            type=raw,value=${{ github.event.client_payload.major }},enable=${{ github.event_name == 'repository_dispatch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'repository_dispatch' }}
            type=raw,value=edge,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=tickward
            org.opencontainers.image.description=Open-source countdown timers for important dates and focused planning.
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.url=https://tickward.com
            org.opencontainers.image.source=https://github.com/CorgiCorner/tickward
            org.opencontainers.image.documentation=https://tickward.com/docs/guides/self-hosting

      - name: Extract Docker Hub metadata
        id: dockerhub-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.client_payload.version }},enable=${{ github.event_name == 'repository_dispatch' }}
            type=raw,value=${{ github.event.client_payload.minor }},enable=${{ github.event_name == 'repository_dispatch' }}
            type=raw,value=${{ github.event.client_payload.major }},enable=${{ github.event_name == 'repository_dispatch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'repository_dispatch' }}
            type=raw,value=edge,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
            type=sha,prefix=sha-,format=short

  build-ghcr:
    name: Build GHCR ${{ matrix.arch }} image
    if: github.repository == 'CorgiCorner/tickward' && needs.prepare.outputs.ghcr_enabled == 'true'
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          # The first Actions publish may require the org package to allow
          # repository-scoped tokens; that setting cannot be preflighted here.
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and push GHCR image digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - name: Export GHCR digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload GHCR digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-ghcr-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build-dockerhub:
    name: Build Docker Hub ${{ matrix.arch }} image
    if: github.repository == 'CorgiCorner/tickward' && needs.prepare.outputs.dockerhub_enabled == 'true'
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker Hub image digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=${{ env.DOCKERHUB_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - name: Export Docker Hub digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload Docker Hub digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-dockerhub-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ghcr:
    name: Create GHCR multi-arch manifest
    if: github.repository == 'CorgiCorner/tickward' && needs.prepare.outputs.ghcr_enabled == 'true'
    needs:
      - prepare
      - build-ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-ghcr-*
          merge-multiple: true

      - name: Create and push GHCR manifest lists
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ env.GHCR_IMAGE }}
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
          RELEASE_MINOR: ${{ github.event.client_payload.minor }}
          RELEASE_MAJOR: ${{ github.event.client_payload.major }}
        run: |
          tag_args=()
          tag_names=()
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            tag_names+=("${RELEASE_VERSION}" "${RELEASE_MINOR}" "${RELEASE_MAJOR}" "latest" "edge")
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tag_names+=("edge")
          fi
          tag_names+=("sha-${GITHUB_SHA::7}")
          for tag in "${tag_names[@]}"; do
            tag_args+=("-t" "${IMAGE_NAME}:${tag}")
          done

          source_args=()
          for digest in *; do
            source_args+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${source_args[@]}"

  merge-dockerhub:
    name: Create Docker Hub multi-arch manifest
    if: github.repository == 'CorgiCorner/tickward' && needs.prepare.outputs.dockerhub_enabled == 'true'
    needs:
      - prepare
      - build-dockerhub
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-dockerhub-*
          merge-multiple: true

      - name: Create and push Docker Hub manifest lists
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ env.DOCKERHUB_IMAGE }}
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
          RELEASE_MINOR: ${{ github.event.client_payload.minor }}
          RELEASE_MAJOR: ${{ github.event.client_payload.major }}
        run: |
          tag_args=()
          tag_names=()
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            tag_names+=("${RELEASE_VERSION}" "${RELEASE_MINOR}" "${RELEASE_MAJOR}" "latest" "edge")
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tag_names+=("edge")
          fi
          tag_names+=("sha-${GITHUB_SHA::7}")
          for tag in "${tag_names[@]}"; do
            tag_args+=("-t" "${IMAGE_NAME}:${tag}")
          done

          source_args=()
          for digest in *; do
            source_args+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${source_args[@]}"
