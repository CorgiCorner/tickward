name: Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push_ghcr:
        description: "Publish to GHCR when GHCR_TOKEN is configured"
        type: boolean
        default: true
      push_dockerhub:
        description: "Publish the Docker Hub mirror when credentials are configured"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/corgicorner/tickward
  DOCKERHUB_IMAGE: docker.io/corgicorner/tickward

jobs:
  publish:
    name: Build and publish
    if: github.repository == 'CorgiCorner/tickward'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check GHCR credentials
        id: ghcr
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PUSH_GHCR_INPUT: ${{ inputs.push_ghcr }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUSH_GHCR_INPUT}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${GHCR_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping GHCR because GHCR_TOKEN is not configured."
          fi

      - name: Log in to GHCR
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PUSH_DOCKERHUB_INPUT: ${{ inputs.push_dockerhub }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUSH_DOCKERHUB_INPUT}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Docker Hub because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image names
        id: images
        env:
          PUBLISH_GHCR: ${{ steps.ghcr.outputs.enabled }}
          PUBLISH_DOCKERHUB: ${{ steps.dockerhub.outputs.enabled }}
        run: |
          if [ "${PUBLISH_GHCR}" != "true" ] && [ "${PUBLISH_DOCKERHUB}" != "true" ]; then
            echo "No container registry credentials are configured." >&2
            exit 1
          fi

          {
            echo "names<<EOF"
            if [ "${PUBLISH_GHCR}" = "true" ]; then
              echo "${GHCR_IMAGE}"
            fi
            if [ "${PUBLISH_DOCKERHUB}" = "true" ]; then
              echo "${DOCKERHUB_IMAGE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.names }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=tickward
            org.opencontainers.image.description=Open-source countdown timers for important dates and focused planning.
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.url=https://tickward.com
            org.opencontainers.image.source=https://github.com/CorgiCorner/tickward
            org.opencontainers.image.documentation=https://tickward.com/docs/guides/self-hosting

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
