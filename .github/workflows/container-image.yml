name: Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push_ghcr:
        description: "Publish to GHCR when GHCR_TOKEN is configured"
        type: boolean
        default: true
      push_dockerhub:
        description: "Publish the Docker Hub mirror when credentials are configured"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/corgicorner/tickward
  DOCKERHUB_IMAGE: docker.io/corgicorner/tickward

jobs:
  prepare:
    name: Prepare image metadata
    if: github.repository == 'CorgiCorner/tickward'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      dockerhub_enabled: ${{ steps.dockerhub.outputs.enabled }}
      ghcr_enabled: ${{ steps.ghcr.outputs.enabled }}
      images: ${{ steps.images.outputs.names }}
      labels: ${{ steps.meta.outputs.labels }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Check GHCR credentials
        id: ghcr
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PUSH_GHCR_INPUT: ${{ inputs.push_ghcr }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUSH_GHCR_INPUT}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${GHCR_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping GHCR because GHCR_TOKEN is not configured."
          fi

      - name: Log in to GHCR
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PUSH_DOCKERHUB_INPUT: ${{ inputs.push_dockerhub }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUSH_DOCKERHUB_INPUT}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Docker Hub because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image names
        id: images
        env:
          PUBLISH_GHCR: ${{ steps.ghcr.outputs.enabled }}
          PUBLISH_DOCKERHUB: ${{ steps.dockerhub.outputs.enabled }}
        run: |
          if [ "${PUBLISH_GHCR}" != "true" ] && [ "${PUBLISH_DOCKERHUB}" != "true" ]; then
            echo "No container registry credentials are configured." >&2
            exit 1
          fi

          {
            echo "names<<EOF"
            if [ "${PUBLISH_GHCR}" = "true" ]; then
              echo "${GHCR_IMAGE}"
            fi
            if [ "${PUBLISH_DOCKERHUB}" = "true" ]; then
              echo "${DOCKERHUB_IMAGE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.names }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=tickward
            org.opencontainers.image.description=Open-source countdown timers for important dates and focused planning.
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.url=https://tickward.com
            org.opencontainers.image.source=https://github.com/CorgiCorner/tickward
            org.opencontainers.image.documentation=https://tickward.com/docs/guides/self-hosting

  build-amd64:
    name: Build amd64 image
    if: github.repository == 'CorgiCorner/tickward'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.prepare.outputs.ghcr_enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64 image digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

      - name: Export amd64 digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-amd64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    name: Build arm64 image
    if: github.repository == 'CorgiCorner/tickward'
    needs: prepare
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.prepare.outputs.ghcr_enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arm64 image digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

      - name: Export arm64 digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-arm64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    if: github.repository == 'CorgiCorner/tickward'
    needs:
      - prepare
      - build-amd64
      - build-arm64
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.prepare.outputs.ghcr_enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create and push manifest lists
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAMES: ${{ needs.prepare.outputs.images }}
          IMAGE_TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          for image in ${IMAGE_NAMES}; do
            tag_args=()
            while IFS= read -r tag; do
              if [ -n "${tag}" ] && [ "${tag#${image}:}" != "${tag}" ]; then
                tag_args+=("-t" "${tag}")
              fi
            done <<< "${IMAGE_TAGS}"

            source_args=()
            for digest in *; do
              source_args+=("${image}@sha256:${digest}")
            done

            docker buildx imagetools create "${tag_args[@]}" "${source_args[@]}"
          done
